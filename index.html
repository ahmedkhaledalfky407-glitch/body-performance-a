<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Performance AI</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"><\/script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"><\/script>
<style>
:root{--bg:#0A0D14;--bg2:#111520;--bg3:#181d2a;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--accent:#00C8FF;--gold:#FFB830;--green:#22C97A;--red:#FF4D6A;--purple:#A78BFA;--text:#E8EDF5;--text2:#8A95AA;--text3:#5A6478;--card:#131825;--radius:14px;--radius-sm:8px;--grid-line:rgba(0,200,255,0.025)}
body.light{--bg:#F4F6FA;--bg2:#EAECF2;--bg3:#DDE1EC;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--accent:#0078B8;--gold:#B87800;--green:#1A7A4A;--red:#C0002A;--purple:#6D4FC2;--text:#1A1D26;--text2:#4A5068;--text3:#8A8FA8;--card:#FFFFFF;--grid-line:rgba(0,120,184,0.04)}
body.light::before{background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px)}
body.light h1{color:#111520}
body.light .card-title{color:#111520}
body.light .step-circle.active{background:rgba(0,120,184,0.08)}
body.light .hero-tag{background:rgba(0,120,184,0.07);border-color:rgba(0,120,184,0.2)}
body.light .ai-banner{background:rgba(0,120,184,0.05);border-color:rgba(0,120,184,0.15)}
body.light .result-hero{background:linear-gradient(135deg,var(--bg3) 0%,rgba(0,120,184,0.05) 100%);border-color:rgba(0,120,184,0.18)}
.theme-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .25s;flex-shrink:0}
.theme-btn:hover{border-color:var(--accent);transform:rotate(20deg)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:15px;line-height:1.65;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.shell{max-width:900px;margin:0 auto;padding:0 20px;position:relative;z-index:1}
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 0;border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Space Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:2px}
.nav-badge{background:rgba(0,200,255,0.1);border:1px solid rgba(0,200,255,0.25);color:var(--accent);font-size:11px;padding:4px 12px;border-radius:20px;font-family:'Space Mono',monospace}
.hero{text-align:center;padding:48px 0 32px}
.hero-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(0,200,255,0.07);border:1px solid rgba(0,200,255,0.2);color:var(--accent);font-size:12px;padding:5px 14px;border-radius:20px;margin-bottom:18px;font-family:'Space Mono',monospace;letter-spacing:1px}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
h1{font-size:clamp(26px,4.5vw,42px);font-weight:600;line-height:1.15;color:#fff;margin-bottom:10px;letter-spacing:-.5px}
h1 span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:520px;margin:0 auto 32px}
.steps-wrap{display:flex;align-items:center;justify-content:center;margin-bottom:36px}
.step-item{display:flex;flex-direction:column;align-items:center;gap:6px}
.step-circle{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:12px;color:var(--text3);transition:all .3s;background:var(--bg2)}
.step-circle.active{border-color:var(--accent);color:var(--accent);background:rgba(0,200,255,0.08);box-shadow:0 0 16px rgba(0,200,255,0.2)}
.step-circle.done{border-color:var(--green);color:var(--bg);background:var(--green)}
.step-lbl{font-size:10px;color:var(--text3)}
.step-lbl.active{color:var(--accent)}
.step-lbl.done{color:var(--green)}
.step-line{width:55px;height:1.5px;background:var(--border);margin-bottom:18px;transition:background .3s}
.step-line.done{background:var(--green)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:26px 28px;margin-bottom:18px;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.card-icon{width:34px;height:34px;border-radius:9px;background:rgba(0,200,255,0.1);display:flex;align-items:center;justify-content:center;font-size:16px}
.card-title{font-size:15px;font-weight:600;color:#fff}
.card-sub{font-size:11px;color:var(--text3);margin-top:1px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:5px}
label{font-size:11px;color:var(--text2);font-weight:500;letter-spacing:.3px}
.field-hint{font-size:10px;color:var(--text3);margin-top:-2px}
input,select{height:40px;padding:0 13px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:'IBM Plex Sans Arabic',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,200,255,0.1)}
input::placeholder{color:var(--text3)}
select option{background:var(--bg2)}
.field-error{font-size:10px;color:var(--red);margin-top:-2px;display:none}
.field-error.show{display:block}
input.err,select.err{border-color:var(--red)}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;padding-top:18px;border-top:1px solid var(--border)}
.btn{height:40px;padding:0 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;font-family:'IBM Plex Sans Arabic',sans-serif;cursor:pointer;transition:all .2s;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--text2);color:var(--text)}
.btn-primary{background:var(--accent);color:var(--bg);font-weight:600}
.btn-primary:hover{background:#22D9FF;transform:translateY(-1px)}
.btn-success{background:var(--green);color:var(--bg);font-weight:600}
.btn-success:hover{background:#30E88A}
.btn-gold{background:var(--gold);color:var(--bg);font-weight:600}
.btn-gold:hover{background:#FFCA50}
.btn-purple{background:var(--purple);color:var(--bg);font-weight:600}
.btn-purple:hover{background:#C4B5FD}
.result-hero{background:linear-gradient(135deg,var(--bg3) 0%,rgba(0,200,255,0.04) 100%);border:1px solid rgba(0,200,255,0.15);border-radius:var(--radius);padding:28px;text-align:center;margin-bottom:18px}
.class-ring{width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-family:'Space Mono',monospace;font-size:30px;font-weight:700}
.ring-A{background:rgba(34,201,122,0.15);color:var(--green);border:2px solid var(--green)}
.ring-B{background:rgba(0,200,255,0.12);color:var(--accent);border:2px solid var(--accent)}
.ring-C{background:rgba(255,184,48,0.12);color:var(--gold);border:2px solid var(--gold)}
.ring-D{background:rgba(255,77,106,0.12);color:var(--red);border:2px solid var(--red)}
.score-bar-wrap{margin:16px auto 0;max-width:320px}
.score-bar-track{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;transition:width .9s cubic-bezier(.4,0,.2,1)}
.score-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);margin-top:5px;text-align:right}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.metric-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 12px}
.metric-val{font-size:20px;font-weight:600;color:#fff;font-family:'Space Mono',monospace}
.metric-lbl{font-size:10px;color:var(--text3);margin-top:2px}
.metric-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;margin-top:5px;display:inline-block;font-family:'Space Mono',monospace}
.badge-green{background:rgba(34,201,122,0.15);color:var(--green)}
.badge-blue{background:rgba(0,200,255,0.12);color:var(--accent)}
.badge-amber{background:rgba(255,184,48,0.12);color:var(--gold)}
.badge-red{background:rgba(255,77,106,0.12);color:var(--red)}
.advice-item{display:flex;gap:11px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border)}
.advice-item:last-child{border-bottom:none}
.advice-num{min-width:24px;height:24px;border-radius:6px;background:rgba(0,200,255,0.1);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'Space Mono',monospace;font-weight:700}
.advice-text{font-size:12px;color:var(--text2);line-height:1.6}
.tab-bar{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:18px;overflow-x:auto}
.tab{flex:1;min-width:fit-content;height:32px;padding:0 12px;border-radius:7px;border:none;background:transparent;color:var(--text3);font-size:11px;font-weight:500;font-family:'IBM Plex Sans Arabic',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab.active{background:var(--bg3);color:var(--accent);border:1px solid rgba(0,200,255,0.2)}
.tbl-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--bg3)}
th{padding:9px 13px;text-align:right;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:9px 13px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.015)}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;font-family:'Space Mono',monospace}
.tag-g{background:rgba(34,201,122,0.12);color:var(--green)}
.tag-b{background:rgba(0,200,255,0.10);color:var(--accent)}
.tag-a{background:rgba(255,184,48,0.12);color:var(--gold)}
.tag-r{background:rgba(255,77,106,0.12);color:var(--red)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.chart-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px}
.chart-title{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:12px;text-align:center}
.chart-full{grid-column:1/-1}
.share-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.share-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:20px;text-align:center}
.share-box h3{font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px}
.share-box p{font-size:11px;color:var(--text3);margin-bottom:14px;line-height:1.5}
#qrContainer{display:flex;justify-content:center;margin:12px 0}
#qrContainer canvas,#qrContainer img{border-radius:8px;border:3px solid #fff}
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--radius-sm);padding:20px;cursor:pointer;transition:all .2s;text-align:center}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(0,200,255,0.04)}
.upload-zone input{display:none}
.upload-icon{font-size:26px;margin-bottom:6px}
.upload-lbl{font-size:12px;color:var(--text2)}
.upload-sub{font-size:10px;color:var(--text3);margin-top:3px}
#uploadPreview{margin-top:12px;display:none}
#uploadPreview img{width:100%;max-height:200px;object-fit:cover;border-radius:8px}
#uploadPreview .img-info{font-size:10px;color:var(--text3);margin-top:4px;text-align:center}
#scanResult{margin-top:10px;font-size:12px;color:var(--green);display:none;line-height:1.5;text-align:right;background:rgba(34,201,122,0.08);border-radius:6px;padding:8px 10px}
#scanError{margin-top:8px;font-size:11px;color:var(--red);display:none;text-align:center;padding:8px;background:rgba(255,77,106,0.08);border-radius:6px}
.cal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.cal-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;text-align:center}
.cal-val{font-size:24px;font-weight:700;font-family:'Space Mono',monospace}
.cal-lbl{font-size:11px;color:var(--text3);margin-top:3px}
.cal-note{font-size:10px;color:var(--text3);margin-top:6px;line-height:1.4}
.macro-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.macro-row:last-child{border-bottom:none}
.macro-name{width:90px;font-size:12px;color:var(--text2);font-weight:500}
.macro-bar-bg{flex:1;height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden}
.macro-bar-fill{height:100%;border-radius:3px}
.macro-val{font-family:'Space Mono',monospace;font-size:11px;color:var(--text2);min-width:80px;text-align:left}
.report-header-bar{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.report-name{font-size:15px;font-weight:600;color:#fff}
.report-date{font-size:11px;color:var(--text3);margin-top:2px}
.ai-banner{background:rgba(0,200,255,0.05);border:1px solid rgba(0,200,255,0.15);border-radius:var(--radius-sm);padding:9px 14px;margin-bottom:16px;display:flex;align-items:center;gap:9px;font-size:11px;color:var(--text2)}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 2s ease-in-out infinite}
footer{text-align:center;padding:28px 0 22px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);font-family:'Space Mono',monospace}
@media(max-width:600px){.form-grid,.charts-grid,.share-grid,.cal-grid,.metric-grid{grid-template-columns:1fr}.chart-full{grid-column:1}.card{padding:18px 14px}.step-line{width:28px}}
</style>
</head>
<body>
<div class="shell">
<nav><div class="nav-logo">BODY.AI</div><div style="display:flex;align-items:center;gap:10px"><button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="تبديل الوضع">🌙</button><div class="nav-badge">&#x25CF; v2 LIVE</div></div></nav>
<div class="hero">
  <div class="hero-tag"><span class="pulse"></span> Charts · QR Code · Image Upload</div>
  <h1>تحليل <span>اللياقة البدنية</span><br>بالذكاء الاصطناعي</h1>
  <p class="hero-sub">تصنيف بدني ذكي · رسوم بيانية تفاعلية · مشاركة QR · رفع التقارير بالصورة</p>
</div>
<div class="steps-wrap" id="stepsBar">
  <div class="step-item"><div class="step-circle active" id="dot1">01</div><div class="step-lbl active" id="lbl1">بياناتك</div></div>
  <div class="step-line" id="line1"></div>
  <div class="step-item"><div class="step-circle" id="dot2">02</div><div class="step-lbl" id="lbl2">القياسات</div></div>
  <div class="step-line" id="line2"></div>
  <div class="step-item"><div class="step-circle" id="dot3">03</div><div class="step-lbl" id="lbl3">النتيجة</div></div>
  <div class="step-line" id="line3"></div>
  <div class="step-item"><div class="step-circle" id="dot4">04</div><div class="step-lbl" id="lbl4">التقرير</div></div>
</div>

<!-- PAGE 1 -->
<div id="page1">
<div class="card">
  <div class="card-header"><div class="card-icon">&#x1F464;</div><div><div class="card-title">البيانات الشخصية</div><div class="card-sub">أخبرنا عن نفسك أولاً</div></div></div>
  <div class="form-grid">
    <div class="form-group fg-full"><label>الاسم الكامل</label><input type="text" id="f-name" placeholder="مثال: أحمد محمد علي"><span class="field-error" id="e-name">برجاء إدخال الاسم</span></div>
    <div class="form-group"><label>العمر (سنة)</label><input type="number" id="f-age" placeholder="25" min="10" max="90"><span class="field-hint">من 10 إلى 90</span><span class="field-error" id="e-age">أدخل عمر صحيح</span></div>
    <div class="form-group"><label>الجنس</label><select id="f-gender"><option value="">اختر...</option><option value="M">ذكر</option><option value="F">أنثى</option></select><span class="field-error" id="e-gender">اختر الجنس</span></div>
    <div class="form-group"><label>الطول (سم)</label><input type="number" id="f-height" placeholder="175" min="100" max="250"><span class="field-hint">100-250 سم</span><span class="field-error" id="e-height">أدخل طولاً صحيحاً</span></div>
    <div class="form-group"><label>الوزن (كجم)</label><input type="number" id="f-weight" placeholder="75" min="20" max="200" step="0.1"><span class="field-hint">20-200 كجم</span><span class="field-error" id="e-weight">أدخل وزناً صحيحاً</span></div>
  </div>
  <div class="btn-row"><button class="btn btn-primary" onclick="go2()">التالي &#x2192;</button></div>
</div>
</div>

<!-- PAGE 2 -->
<div id="page2" style="display:none">
<div class="ai-banner"><span class="ai-dot"></span>هذه القياسات تُغذّي نموذج MLP 512-256-128 مباشرةً — كل رقم له تأثير على التصنيف النهائي</div>
<div class="card">
  <div class="card-header"><div class="card-icon">&#x1F4CF;</div><div><div class="card-title">القياسات الجسدية</div><div class="card-sub">أدخل قياساتك بدقة</div></div></div>
  <div class="form-grid">
    <div class="form-group"><label>نسبة الدهون (%)</label><input type="number" id="f-fat" placeholder="20" min="1" max="60" step="0.1"><span class="field-hint">طبيعي: 10-25% ذكور / 18-32% إناث</span></div>
    <div class="form-group"><label>ضغط الانبساطي (mmHg)</label><input type="number" id="f-dia" placeholder="80" min="40" max="130"><span class="field-hint">الرقم الأسفل — طبيعي: 60-80</span></div>
    <div class="form-group"><label>ضغط الانقباطي (mmHg)</label><input type="number" id="f-sys" placeholder="120" min="60" max="200"><span class="field-hint">الرقم الأعلى — طبيعي: 90-120</span></div>
    <div class="form-group"><label>قوة القبضة (Grip Force)</label><input type="number" id="f-grip" placeholder="40" min="0" max="100" step="0.1"><span class="field-hint">متوسط الذكور: 40-50</span></div>
    <div class="form-group"><label>انحناء للأمام (سم)</label><input type="number" id="f-bend" placeholder="15" min="-20" max="60" step="0.1"><span class="field-hint">ممكن يكون سالب</span></div>
    <div class="form-group"><label>عدد الجلسات (Sit-ups)</label><input type="number" id="f-situps" placeholder="35" min="0" max="100"><span class="field-hint">أقصى عدد في دقيقة</span></div>
    <div class="form-group fg-full"><label>القفز العريض (سم)</label><input type="number" id="f-jump" placeholder="180" min="0" max="300"><span class="field-hint">المسافة من نقطة الوقوف للهبوط</span></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-ghost" onclick="showPage(1)">&#x2190; رجوع</button>
    <button class="btn btn-primary" onclick="analyze()">&#x26A1; تحليل الآن</button>
  </div>
</div>
</div>

<!-- PAGE 3 -->
<div id="page3" style="display:none">
<div id="resultArea"></div>
<div class="card">

<script>
function toggleTheme(){
  var isLight=document.body.classList.toggle('light');
  document.getElementById('themeBtn').textContent=isLight?'☀️':'🌙';
  localStorage.setItem('bpai-theme',isLight?'light':'dark');
}
(function(){
  var saved=localStorage.getItem('bpai-theme');
  var preferLight=window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches;
  if(saved==='light'||(saved===null&&preferLight)){
    document.body.classList.add('light');
    document.addEventListener('DOMContentLoaded',function(){
      var btn=document.getElementById('themeBtn');
      if(btn) btn.textContent='☀️';
    });
  }
})();

var CINFO={

  B:{lbl:'مستوى جيد',en:'Good Performance',badge:'badge-blue',tag:'tag-b',bar:'#00C8FF'},
  C:{lbl:'مستوى متوسط',en:'Average',badge:'badge-amber',tag:'tag-a',bar:'#FFB830'},
  D:{lbl:'يحتاج تحسين',en:'Needs Improvement',badge:'badge-red',tag:'tag-r',bar:'#FF4D6A'}
};
var ADVICE={
  A:['أداؤك في المستوى الاحترافي — حافظ على تنوع التمارين لمنع الإصابات وتحسين الأداء المستمر.',
     'ركز على التغذية النخبوية: بروتين عالي الجودة، كربوهيدرات معقدة، وتوقيت الوجبات حول التمرين.',

     'فكر في مسابقات لياقة أو مجموعات تدريبية متقدمة للحفاظ على الدافعية.'],
  B:['مستوى جيد جداً مع إمكانية تحسين حقيقية — أضف تمرين قوة مرة إضافية أسبوعياً.',
     'زد البروتين إلى 1.6 جم لكل كجم من وزنك وراجع توزيع الوجبات لدعم العضلات.',
     'حسّن جودة النوم إلى 7-8 ساعات يومياً — التعافي جزء أساسي من التقدم الرياضي.',
     'الانتظام هو مفتاحك — جدول ثابت لا تكسره وتتبع تقدمك أسبوعياً.'],
  C:['ابدأ ببرنامج تدريبي منتظم 3 مرات أسبوعياً — الانتظام أهم من الشدة.',
     'الكارديو المعتدل 30 دقيقة يومياً (مشي سريع) سيحسن لياقتك القلبية بسرعة.',
     'راجع نظامك الغذائي وقلل الأطعمة المصنعة والسكريات المضافة.',
     'اعمل فحصاً طبياً شاملاً قبل بدء برنامج مكثف وتابع ضغط الدم.'],
  D:['الخطوة الأولى هي المهمة — ابدأ بمشي 15-20 دقيقة يومياً.',
     'استشر طبيباً قبل أي نشاط بدني مكثف للتأكد من سلامتك.',
     'غير نظامك الغذائي تدريجياً: أضف خضاراً وفاكهة وقلل الدهون المشبعة.',
     'ضع أهدافاً صغيرة وقابلة للقياس كل أسبوع وتابع تحسنك.']
};
var EX={
  A:{t:'برنامج الأبطال — 5 أيام',d:[{d:'السبت',t:'قوة صدر + ترايسبس',e:'بنش برس 4x10 · فلاي 3x12 · ترايسبس 3x15',n:'ثقيل',c:'tag-r'},{d:'الأحد',t:'قوة ظهر + بايسبس',e:'ديدليفت 4x8 · سحب 3x10 · كيرل 3x12',n:'ثقيل',c:'tag-r'},{d:'الاثنين',t:'HIIT كارديو',e:'30 دقيقة تدريب متقطع أو ركض 5كم',n:'مكثف',c:'tag-a'},{d:'الثلاثاء',t:'قوة أرجل + كور',e:'سكوات 4x10 · ليج برس 3x12 · بلانك 3x60s',n:'ثقيل',c:'tag-r'},{d:'الأربعاء',t:'أكتاف وعضلات صغيرة',e:'أوفرهيد برس 4x10 · لاترال ريز 3x15',n:'متوسط',c:'tag-b'},{d:'الخميس',t:'استرداد نشط',e:'يوجا أو تمدد 30 دقيقة',n:'خفيف',c:'tag-g'},{d:'الجمعة',t:'راحة كاملة',e:'نوم جيد + تغذية',n:'راحة',c:'tag-g'}]},
  B:{t:'برنامج التقدم — 4 أيام',d:[{d:'السبت',t:'قوة جسم علوي',e:'بنش برس 3x10 · سحب 3x10 · أكتاف 3x10',n:'متوسط',c:'tag-b'},{d:'الأحد',t:'كارديو منتظم',e:'هرولة أو مشي سريع 35-40 دقيقة',n:'متوسط',c:'tag-b'},{d:'الاثنين',t:'راحة نشطة',e:'مشي 20 دقيقة + تمدد',n:'خفيف',c:'tag-g'},{d:'الثلاثاء',t:'قوة جسم سفلي',e:'سكوات 3x10 · ليج كيرل 3x12 · كاف ريز',n:'متوسط',c:'tag-b'},{d:'الأربعاء',t:'كارديو + كور',e:'ركض 20 دقيقة + بلانك 3 جولات',n:'متوسط',c:'tag-b'},{d:'الخميس',t:'راحة',e:'تمدد 15 دقيقة',n:'خفيف',c:'tag-g'},{d:'الجمعة',t:'راحة كاملة',e:'استرداد كامل',n:'راحة',c:'tag-g'}]},
  C:{t:'برنامج البداية — 3 أيام',d:[{d:'السبت',t:'تمرين كامل',e:'سكوات جسم 3x15 · ضغط 3x8 · تمدد',n:'خفيف',c:'tag-g'},{d:'الأحد',t:'مشي نشط',e:'مشي 25-30 دقيقة',n:'خفيف',c:'tag-g'},{d:'الاثنين',t:'راحة',e:'راحة تامة',n:'راحة',c:'tag-g'},{d:'الثلاثاء',t:'كارديو خفيف',e:'دراجة ثابتة 25 دقيقة',n:'خفيف',c:'tag-g'},{d:'الأربعاء',t:'راحة',e:'راحة تامة',n:'راحة',c:'tag-g'},{d:'الخميس',t:'مقاومة خفيفة',e:'دمبل خفيف 3x15 + كور',n:'خفيف',c:'tag-g'},{d:'الجمعة',t:'يوجا',e:'يوجا للمبتدئين 20 دقيقة',n:'راحة',c:'tag-g'}]},
  D:{t:'برنامج الانطلاق',d:[{d:'السبت',t:'مشي خفيف',e:'15-20 دقيقة',n:'خفيف جداً',c:'tag-g'},{d:'الأحد',t:'راحة',e:'راحة',n:'راحة',c:'tag-g'},{d:'الاثنين',t:'إطالة',e:'10-15 دقيقة',n:'خفيف جداً',c:'tag-g'},{d:'الثلاثاء',t:'راحة',e:'راحة',n:'راحة',c:'tag-g'},{d:'الأربعاء',t:'مشي',e:'20 دقيقة',n:'خفيف جداً',c:'tag-g'},{d:'الخميس',t:'راحة',e:'تنفس عميق',n:'راحة',c:'tag-g'},{d:'الجمعة',t:'راحة',e:'راحة كاملة',n:'راحة',c:'tag-g'}]}
};

function showPage(n){
  [1,2,3,4].forEach(function(i){
    var p=document.getElementById('page'+i);
    if(p)p.style.display=i===n?'block':'none';
    var d=document.getElementById('dot'+i),l=document.getElementById('lbl'+i),ln=document.getElementById('line'+i);
    d.className='step-circle'+(i<n?' done':i===n?' active':'');
    l.className='step-lbl'+(i<n?' done':i===n?' active':'');
    if(ln)ln.className='step-line'+(i<n?' done':'');
  });
  window.scrollTo({top:0,behavior:'smooth'});
}
function showTab(id,btn){
  ['t-summary','t-exercise','t-nutrition','t-calories','t-share'].forEach(function(s){var e=document.getElementById(s);if(e)e.style.display='none';});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  var t=document.getElementById(id);if(t)t.style.display='block';
  if(btn)btn.classList.add('active');
  if(id==='t-share')buildShare();
}
function val(id,eid,fn){var e=document.getElementById(id),er=document.getElementById(eid),ok=fn(e.value);e.classList.toggle('err',!ok);if(er)er.classList.toggle('show',!ok);return ok;}
function go2(){
  var ok=true;
  ok=val('f-name','e-name',function(v){return v.trim().length>=2;})&&ok;
  ok=val('f-age','e-age',function(v){var n=+v;return n>=10&&n<=90;})&&ok;
  ok=val('f-gender','e-gender',function(v){return v!=='';})&&ok;
  ok=val('f-height','e-height',function(v){var n=+v;return n>=100&&n<=250;})&&ok;
  ok=val('f-weight','e-weight',function(v){var n=+v;return n>=20&&n<=200;})&&ok;
  if(!ok)return;
  U.name=document.getElementById('f-name').value.trim();
  U.age=+document.getElementById('f-age').value;
  U.gender=document.getElementById('f-gender').value;
  U.height=+document.getElementById('f-height').value;
  U.weight=+document.getElementById('f-weight').value;
  showPage(2);
}
function bmi(w,h){return Math.round(w/((h/100)*(h/100))*10)/10;}
function classify(d){
  var g=d.gender==='M';
  var gN=g?(d.grip<20?0:d.grip<35?.3:d.grip<50?.6:d.grip<65?.85:1):(d.grip<15?0:d.grip<25?.3:d.grip<38?.6:d.grip<50?.85:1);
  var sN=d.situps<15?0:d.situps<30?.3:d.situps<45?.6:d.situps<60?.85:1;
  var bN=d.bend<0?0:d.bend<10?.2:d.bend<20?.5:d.bend<30?.75:1;
  var jN=d.jump<120?0:d.jump<160?.25:d.jump<200?.55:d.jump<230?.8:1;
  var fN=d.fat>35?0:d.fat>28?.2:d.fat>22?.5:d.fat>15?.8:1;
  var aN=d.age>65?.3:d.age>50?.5:d.age>35?.75:d.age>25?.9:1;
  var bV=bmi(d.weight,d.height);
  var bmN=bV>35?0:bV>30?.25:bV>25?.6:bV>18?1:.7;
  var pV=d.sys-d.dia;
  var pN=pV>60?.2:pV>50?.5:pV>40?.8:1;
  var sc=gN*.20+sN*.20+bN*.15+jN*.20+fN*.10+aN*.05+bmN*.05+pN*.05;
  var cls=sc>=.78?'A':sc>=.58?'B':sc>=.38?'C':'D';
  var pct=cls==='A'?Math.min(Math.round(75+sc*25),99):cls==='B'?Math.min(Math.round(55+sc*25),79):cls==='C'?Math.min(Math.round(35+sc*25),60):Math.min(Math.round(15+sc*20),38);
  return{cls:cls,score:Math.round(sc*100),bmiV:bV,pp:Math.round(pV),pct:pct,gN:Math.round(gN*100),sN:Math.round(sN*100),bN:Math.round(bN*100),jN:Math.round(jN*100),fN:Math.round(fN*100),aN:Math.round(aN*100)};
}
function analyze(){
  U.m={fat:+document.getElementById('f-fat').value||20,dia:+document.getElementById('f-dia').value||80,sys:+document.getElementById('f-sys').value||120,grip:+document.getElementById('f-grip').value||35,bend:+document.getElementById('f-bend').value||10,situps:+document.getElementById('f-situps').value||30,jump:+document.getElementById('f-jump').value||170,age:U.age,gender:U.gender,height:U.height,weight:U.weight};
  R=classify(U.m);
  renderResult();buildCharts();buildReport();showPage(3);
}
function renderResult(){
  var info=CINFO[R.cls];
  var bC=R.bmiV<25?'tag-g':R.bmiV<30?'tag-a':'tag-r';
  var pC=R.pp<40?'tag-g':R.pp<50?'tag-b':'tag-r';
  var h='<div class="result-hero"><div class="class-ring ring-'+R.cls+'">'+R.cls+'</div>';
  h+='<div style="font-size:12px;color:var(--text2);margin-bottom:5px">نتيجة '+U.name+'</div>';
  h+='<div style="font-size:19px;font-weight:600;color:#fff">'+info.lbl+'</div>';
  h+='<div style="font-size:12px;color:var(--text2);margin-top:3px">'+info.en+' · MLP 75.18% Accuracy</div>';
  h+='<div class="score-bar-wrap"><div class="score-bar-track"><div class="score-bar-fill" style="width:'+R.pct+'%;background:'+info.bar+'"></div></div>';
  h+='<div class="score-label">درجة الأداء: '+R.pct+'%</div></div></div>';
  h+='<div class="metric-grid">';
  h+='<div class="metric-box"><div class="metric-val">'+R.bmiV+'</div><div class="metric-lbl">BMI</div><div class="metric-badge '+bC+'">'+(R.bmiV<18.5?'نقص':R.bmiV<25?'طبيعي':R.bmiV<30?'زيادة خفيفة':'زيادة')+'</div></div>';
  h+='<div class="metric-box"><div class="metric-val">'+R.pp+'</div><div class="metric-lbl">ضغط النبض mmHg</div><div class="metric-badge '+pC+'">'+(R.pp<40?'ممتاز':R.pp<50?'جيد':'مرتفع')+'</div></div>';
  h+='<div class="metric-box"><div class="metric-val">'+R.score+'%</div><div class="metric-lbl">درجة اللياقة</div><div class="metric-badge '+info.badge+'">الفئة '+R.cls+'</div></div></div>';
  h+='<div class="card"><div class="card-header"><div class="card-icon">&#x1F916;</div><div><div class="card-title">توصيات الذكاء الاصطناعي</div><div class="card-sub">مخصصة بناءً على تحليل قياساتك</div></div></div>';
  ADVICE[R.cls].forEach(function(a,i){h+='<div class="advice-item"><div class="advice-num">0'+(i+1)+'</div><div class="advice-text">'+a+'</div></div>';});
  h+='</div>';
  document.getElementById('resultArea').innerHTML=h;
  setTimeout(drawCharts,80);
}

function drawCharts(){
  var m=U.m, cls=R.cls;
  var isDark=!document.body.classList.contains('light');
  var gridC=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
  var textC=isDark?'#8A95AA':'#4A5068';
  var accentC=isDark?'#00C8FF':'#0078B8';

  // ── Averages per class ──────────────────────────────────────
  var AVG={
    A:{grip:55,situps:58,bend:26,jump:220,fat:14},
    B:{grip:42,situps:44,bend:18,jump:190,fat:20},
    C:{grip:32,situps:30,bend:10,jump:160,fat:26},
    D:{grip:22,situps:18,bend:4, jump:130,fat:33}
  };
  var avg=AVG[cls];

  // ── destroy old charts ───────────────────────────────────────
  if(CH.radar)  CH.radar.destroy();
  if(CH.donut)  CH.donut.destroy();
  if(CH.bar)    CH.bar.destroy();

  // ── 1. Radar Chart ──────────────────────────────────────────
  var radarCtx=document.getElementById('radarChart').getContext('2d');
  var normU=[
    Math.min((m.grip/65)*100,100),
    Math.min((m.situps/70)*100,100),
    Math.min(((m.bend+20)/70)*100,100),
    Math.min((m.jump/260)*100,100),
    Math.min(((50-m.fat)/50)*100,100)
  ];
  var normA=[
    Math.min((avg.grip/65)*100,100),
    Math.min((avg.situps/70)*100,100),
    Math.min(((avg.bend+20)/70)*100,100),
    Math.min((avg.jump/260)*100,100),
    Math.min(((50-avg.fat)/50)*100,100)
  ];
  CH.radar=new Chart(radarCtx,{
    type:'radar',
    data:{
      labels:['قوة القبضة','الجلسات','المرونة','القفز','الدهون (عكسي)'],
      datasets:[
        {label:'أنت',data:normU,
         borderColor:accentC,backgroundColor:accentC+'33',
         borderWidth:2,pointBackgroundColor:accentC,pointRadius:4},
        {label:'متوسط الفئة '+cls,data:normA,
         borderColor:isDark?'#FFB830':'#B87800',
         backgroundColor:(isDark?'#FFB830':'#B87800')+'22',
         borderWidth:1.5,borderDash:[4,4],
         pointBackgroundColor:isDark?'#FFB830':'#B87800',pointRadius:3}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:true,
      plugins:{legend:{labels:{color:textC,font:{size:11},boxWidth:12}}},
      scales:{r:{
        min:0,max:100,
        grid:{color:gridC},
        angleLines:{color:gridC},
        ticks:{display:false},
        pointLabels:{color:textC,font:{size:10}}
      }}
    }
  });

  // ── 2. Donut Chart ───────────────────────────────────────────
  var donutCtx=document.getElementById('donutChart').getContext('2d');
  var clsColors={A:isDark?'#22C97A':'#1A7A4A',B:isDark?'#00C8FF':'#0078B8',C:isDark?'#FFB830':'#B87800',D:isDark?'#FF4D6A':'#C0002A'};
  var scores=[
    Math.round((m.grip/65)*100),
    Math.round((m.situps/70)*100),
    Math.round(Math.max(((m.bend+20)/70)*100,0)),
    Math.round((m.jump/260)*100),
    Math.round(Math.max(((50-m.fat)/50)*100,0))
  ].map(function(v){return Math.min(v,100);});
  var totalScore=Math.round(scores.reduce(function(a,b){return a+b;},0)/scores.length);
  CH.donut=new Chart(donutCtx,{
    type:'doughnut',
    data:{
      labels:['قوة القبضة','الجلسات','المرونة','القفز','الدهون'],
      datasets:[{
        data:scores,
        backgroundColor:[
          clsColors[cls]+'DD','#A78BFA99','#FFB83099','#22C97A99','#FF4D6A99'
        ],
        borderColor:isDark?'#131825':'#FFFFFF',
        borderWidth:2,
        hoverOffset:6
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:true,
      cutout:'62%',
      plugins:{
        legend:{position:'bottom',labels:{color:textC,font:{size:10},boxWidth:10,padding:8}},
        tooltip:{callbacks:{label:function(ctx){return ' '+ctx.label+': '+ctx.raw+'%';}}}
      }
    },
    plugins:[{
      id:'centerText',
      beforeDraw:function(ch){
        var ctx2=ch.ctx,cx=ch.chartArea?(ch.chartArea.left+ch.chartArea.right)/2:ch.width/2,
            cy=ch.chartArea?(ch.chartArea.top+ch.chartArea.bottom)/2:ch.height/2;
        ctx2.save();
        ctx2.textAlign='center';ctx2.textBaseline='middle';
        ctx2.font='bold 22px Space Mono,monospace';
        ctx2.fillStyle=clsColors[cls];
        ctx2.fillText(totalScore+'%',cx,cy-8);
        ctx2.font='11px IBM Plex Sans Arabic,sans-serif';
        ctx2.fillStyle=textC;
        ctx2.fillText('اللياقة الكلية',cx,cy+14);
        ctx2.restore();
      }
    }]
  });

  // ── 3. Bar Chart ─────────────────────────────────────────────
  var barCtx=document.getElementById('barChart').getContext('2d');
  var labels=['قوة القبضة','الجلسات','المرونة','القفز','نسبة الدهون'];
  var userVals=[m.grip,m.situps,m.bend,m.jump,m.fat];
  var avgVals=[avg.grip,avg.situps,avg.bend,avg.jump,avg.fat];
  CH.bar=new Chart(barCtx,{
    type:'bar',
    data:{
      labels:labels,
      datasets:[
        {label:'قياساتك',data:userVals,
         backgroundColor:accentC+'CC',borderColor:accentC,
         borderWidth:1.5,borderRadius:5},
        {label:'متوسط الفئة '+cls,data:avgVals,

function downloadQR(){

function dov(e){e.preventDefault();document.getElementById('dropZone').classList.add('drag');}

function handleImg(file){
  if(!file||!file.type.startsWith('image/'))return;
  var reader=new FileReader();
  reader.onload=function(e){
    var src=e.target.result;
    document.getElementById('prevImg').src=src;
    document.getElementById('imgInfo').textContent=file.name+' · '+(file.size/1024).toFixed(1)+' KB';
    document.getElementById('uploadPreview').style.display='block';
    scanQR(src);
  };
  reader.readAsDataURL(file);
}
function scanQR(src){
  var sEl=document.getElementById('scanResult'),eEl=document.getElementById('scanError');
  sEl.style.display='none';eEl.style.display='none';sEl.textContent='';eEl.textContent='';
  var img=new Image();
  img.onload=function(){
    var cv=document.createElement('canvas');cv.width=img.width;cv.height=img.height;
    var ctx=cv.getContext('2d');ctx.drawImage(img,0,0);
    var idata=ctx.getImageData(0,0,cv.width,cv.height);
    var code=null;
    try{code=jsQR(idata.data,idata.width,idata.height,{inversionAttempts:'attemptBoth'});}catch(err){}
    if(code){
      sEl.innerHTML='<strong>&#x2714; تم مسح QR بنجاح!</strong><br>'+code.data;
      sEl.style.display='block';
      try{var url=new URL(code.data),u=url.searchParams.get('u'),c=url.searchParams.get('c'),s=url.searchParams.get('s'),b=url.searchParams.get('b');
        if(u&&c&&s){sEl.innerHTML+='<br><br><strong>بيانات مستخدم:</strong><br>الاسم: '+decodeURIComponent(u)+'<br>الفئة: '+c+' ('+CINFO[c].lbl+')<br>الأداء: '+s+'%'+(b?' · BMI: '+b:'');}}catch(ex){}
    } else {eEl.textContent='لم يُعثر على QR Code — تأكد أن الصورة واضحة وتحتوي على كود QR';eEl.style.display='block';}
  };
  img.src=src;
}
